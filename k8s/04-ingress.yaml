apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authapp-ingress
  annotations:
    # Sans rewrite-target, l'URL est transmise telle quelle au service backend
    # /api/auth/register → backend reçoit /api/auth/register ✓
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # Les requêtes /api/* sont routées vers le backend sans réécriture d'URL
          - path: /api/.*
            pathType: ImplementationSpecific
            backend:
              service:
                name: authapp-backend
                port:
                  number: 3000
          # Toutes les autres requêtes vont vers le frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: authapp-frontend
                port:
                  number: 80