apiVersion: apps/v1
kind: Deployment # Contrairement au StatefulSet de Mongo, le Deployment est conçu pour les applications "sans état" (stateless). Ici, les pods backend sont du bétail jetable et 100% interchangeables.
metadata:
  name: authapp-backend
  namespace: authapp
  labels:
    app: authapp-backend
spec:
  replicas: 1 # Nombre d'instances. Facilement scalable car aucun des pods ne gère de disque de données persistant.
  selector:
    matchLabels:
      app: authapp-backend
  strategy:
    type: RollingUpdate  # mise à jour progressive pod par pod, sans interruption de service
    rollingUpdate:
      maxSurge: 0        # ne crée PAS de pod supplémentaire pendant la mise à jour
      maxUnavailable: 1  # supprime l'ancien pod AVANT de créer le nouveau
                         # adapté à un nœud unique avec ressources limitées :
                         # maxSurge: 1 causerait un Pending faute de CPU/RAM disponible
  template:
    metadata:
      labels:
        app: authapp-backend
    spec:
      containers:
        - name: backend
          image: mart1nsmn/authapp-backend:latest
          ports:
            - containerPort: 3000
          env: # Section pour injecter dynamiquement des variables d'environnement dans Node.js
            - name: PORT
              value: "3000" # Le port n'est pas un secret, on peut le laisser en clair dans le code
            
            # Injection du secret pour MONGO_URI
            - name: MONGO_URI
              valueFrom: # Au lieu d'écrire la chaîne de connexion en dur, on dit à K8s d'aller la lire ailleurs
                secretKeyRef: # On pointe vers un objet de type "Secret" existant dans le cluster
                  name: backend-secrets # Le nom du coffre-fort créé par notre fichier 00-secrets.yaml
                  key: MONGO_URI # Le nom de la clé exacte à récupérer et à décoder
            
            # Injection du secret pour JWT_SECRET
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: JWT_SECRET

          # Kubernetes attend que cette probe soit OK avant d'envoyer du trafic.
          # Le pod ne reçoit aucune requête tant qu'Express n'a pas démarré,
          # que MongoDB n'est pas connecté, ET que mongoose.connection.readyState === 1.
          # Si MongoDB tombe après le démarrage, /api/health retourne 503 et K8s
          # retire automatiquement le pod du load balancer.
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10  # laisse le temps à Node.js + MongoDB de démarrer
            periodSeconds: 5
            failureThreshold: 3

          # Kubernetes redémarre le pod si cette probe échoue.
          # Vérifie que le process Node.js répond toujours ET que MongoDB est connecté.
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20  # plus long que la readiness : on attend que le pod soit prêt d'abord
            periodSeconds: 10
            failureThreshold: 3

          # ──────────────────────────────────────────────────────────────
          # NOTE : bloc resources commenté volontairement.
          # Sur un cluster de production on définirait :
          #   requests: { cpu: "100m", memory: "128Mi" }
          #   limits:   { cpu: "300m", memory: "256Mi" }
          # Commenté ici pour compatibilité avec l'instance gratuite
          # Infomaniak (1 vCPU / 2Go RAM partagés avec 3 pods MongoDB,
          # le frontend et les composants système).
          # ──────────────────────────────────────────────────────────────
          # resources:
          #   requests:
          #     cpu: "100m"
          #     memory: "128Mi"
          #   limits:
          #     cpu: "300m"
          #     memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: authapp-backend
  namespace: authapp
spec:
  selector:
    app: authapp-backend
  ports:
    - port: 3000 # Le port exposé aux autres pods du cluster (ex: le frontend)
      targetPort: 3000 # Le port sur lequel l'app Node.js écoute vraiment
  type: ClusterIP # Contrairement à Mongo (où c'était 'None'), ClusterIP génère une IP virtuelle stable. C'est lui qui fait le Load Balancing interne en répartissant le trafic aléatoirement vers les différents réplicas du backend. (Sécurisé car non accessible depuis Internet).