services:
  mongo:
    image: mongo:7
    container_name: auth_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network

  backend:
    build: ./backend # Optionnel: Pratique si tu veux rebuild depuis le compose
    image: mart1nsmn/authapp-backend:latest
    container_name: auth_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # On utilise la syntaxe ${VAR} pour lire depuis le fichier .env
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/authdb}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3000
    depends_on:
      - mongo
    networks:
      - app_network

  frontend:
    build: ./frontend # Optionnel
    image: mart1nsmn/authapp-frontend:latest
    container_name: auth_frontend
    restart: unless-stopped
    ports:
      - "8080:8080" # Attention : modifié car Nginx écoute maintenant sur le 8080
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  mongo_data:

networks:
  app_network:
    driver: bridge