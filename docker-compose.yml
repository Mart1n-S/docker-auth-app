
services:
  mongo:
    image: mongo:7
    container_name: auth_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app_network

  backend:
    image: mart1nsmn/authapp-backend:latest
    container_name: auth_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/authdb
      - JWT_SECRET=super_secret_key_change_me
      - PORT=3000
    depends_on:
      - mongo
    networks:
      - app_network

  frontend:
    image: mart1nsmn/authapp-frontend:latest
    container_name: auth_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  mongo_data:

networks:
  app_network:
    driver: bridge
