name: CI/CD Pipeline

# Le pipeline se déclenche uniquement sur un push sur la branche main
on:
  push:
    branches:
      - main

jobs:
  # Stage 1 : Build des images Docker
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Se connecter à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          # On pousse directement depuis ce stage avec le SHA du commit comme tag
          # Le SHA garantit une traçabilité parfaite : on sait exactement quel commit
          # correspond à quelle image déployée
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/authapp-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/authapp-backend:latest

      - name: Build image frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/authapp-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/authapp-frontend:latest

  # Stage 2 : Déploiement sur le cluster
  deploy:
    name: Deploy sur Kubernetes
    runs-on: ubuntu-latest
    # Ce stage ne démarre que si le build a réussi
    needs: build
    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Configurer kubectl
        # On décode le kubeconfig depuis le secret base64 et on l'écrit dans un fichier
        run: |
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 --decode > kubeconfig.yaml
          echo "KUBECONFIG=$PWD/kubeconfig.yaml" >> $GITHUB_ENV

      - name: Appliquer les manifestes (ordre critique pour le StatefulSet)
        run: |
          # Les secrets et la config doivent exister avant les pods qui en dépendent
          kubectl apply -f k8s/01-mongo.yaml
          kubectl apply -f k8s/02-backend.yaml
          kubectl apply -f k8s/03-frontend.yaml
          kubectl apply -f k8s/04-ingress.yaml

      - name: Forcer le redémarrage des Deployments (rolling update)
        run: |
          # rollout restart force les pods à redémarrer et puller la nouvelle image
          # même si le tag :latest n'a pas changé côté Kubernetes
          kubectl rollout restart deployment/authapp-backend
          kubectl rollout restart deployment/authapp-frontend

      - name: Attendre que les Deployments soient stables
        run: |
          # rollout status bloque le pipeline jusqu'à ce que tous les pods
          # soient Running et Ready — si ça échoue, le pipeline échoue aussi
          kubectl rollout status deployment/authapp-backend --timeout=120s
          kubectl rollout status deployment/authapp-frontend --timeout=120s