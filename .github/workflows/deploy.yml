name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # Stage 1 : Build et push des images Docker
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Se connecter à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et push image backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          # On pousse directement depuis ce stage avec le SHA du commit comme tag
          # Le SHA garantit une traçabilité parfaite : on sait exactement quel commit
          # correspond à quelle image déployée
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/authapp-backend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/authapp-backend:latest

      - name: Build et push image frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/authapp-frontend:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/authapp-frontend:latest

  # Stage 2 : Déploiement sur le cluster
  deploy:
    name: Deploy sur Kubernetes
    runs-on: ubuntu-latest
    # Ce stage ne démarre que si le build a réussi
    needs: build
    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Configurer kubectl
        # On décode le kubeconfig depuis le secret base64 et on l'écrit dans un fichier
        run: |
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 --decode > kubeconfig.yaml
          echo "KUBECONFIG=$PWD/kubeconfig.yaml" >> $GITHUB_ENV

      - name: Configurer le namespace par défaut
        # Toutes les ressources applicatives sont dans le namespace authapp
        run: kubectl config set-context --current --namespace=authapp

      - name: Appliquer les manifestes
        run: |
          kubectl apply -f k8s/01-mongo.yaml
          kubectl apply -f k8s/02-backend.yaml
          kubectl apply -f k8s/03-frontend.yaml
          kubectl apply -f k8s/04-ingress.yaml
          kubectl apply -f k8s/05-uptime-kuma.yaml

      - name: Mettre à jour l'image avec le tag du commit
        # On patch directement l'image avec le SHA du commit.
        # Cela force Kubernetes à puller la nouvelle image même si le tag :latest
        # est identique côté cluster — le SHA garantit l'unicité de chaque build.
        run: |
          kubectl set image deployment/authapp-backend \
            backend=${{ secrets.DOCKERHUB_USERNAME }}/authapp-backend:${{ github.sha }}
          kubectl set image deployment/authapp-frontend \
            frontend=${{ secrets.DOCKERHUB_USERNAME }}/authapp-frontend:${{ github.sha }}

      - name: Attendre que les déploiements soient stables
        run: |
          kubectl rollout status deployment/authapp-backend --timeout=180s
          kubectl rollout status deployment/authapp-frontend --timeout=180s